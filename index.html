<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Medicine Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #071227 0%, #0b1730 100%);
      min-height: 100vh;
      color: #fff;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 28px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px;
    }

    .top small {
      display: block;
      color: #97a3b6;
      letter-spacing: 2px;
      font-size: 11px;
      margin-bottom: 8px;
    }

    .top h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 800;
    }
