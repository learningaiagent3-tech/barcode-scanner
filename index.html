<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
  <h2>Scan Medicine Barcode</h2>
  <div id="reader" style="width: 320px;"></div>
  <p id="status">Waiting for scan...</p>

  <script>
    const webhook = "PASTE_YOUR_N8N_WEBHOOK_HERE";
    let lastCode = "";

    function onScanSuccess(decodedText) {
      if (decodedText === lastCode) return;
      lastCode = decodedText;

      document.getElementById("status").innerText = "Sending: " + decodedText;

      fetch(webhook, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          barcode: decodedText
        })
      })
      .then(() => {
        document.getElementById("status").innerText = "Sent: " + decodedText;
      })
      .catch((error) => {
        document.getElementById("status").innerText = "Error sending barcode";
        console.error(error);
      });
    }

    const scanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: 250,
        rememberLastUsedCamera: true,
        supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
      },
      false
    );

    scanner.render(onScanSuccess);
  </script>
</body>
</html>
