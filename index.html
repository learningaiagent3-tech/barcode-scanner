<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Medicine Barcode Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #dff5f5 0%, #eaf7f7 100%);
      min-height: 100vh;
      color: #111827;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 24px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.75);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      font-size: 18px;
      cursor: pointer;
    }

    .title-wrap {
      text-align: center;
      flex: 1;
    }

    .title-wrap small {
      display: block;
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .hero {
      background: rgba(255,255,255,0.68);
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 800;
      color: #111827;
    }

    .hero p {
      margin: 0 0 16px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }

    .scanner-shell {
      margin-top: 10px;
      background: #111827;
      border-radius: 28px;
      padding: 14px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(17,24,39,0.22);
    }

    .scanner-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #f9fafb;
      margin-bottom: 12px;
      padding: 2px 4px;
    }

    .scanner-header .left {
      font-size: 14px;
      font-weight: 700;
    }

    .live-pill {
      background: rgba(34,197,94,0.18);
      color: #86efac;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    #reader {
      width: 100%;
      overflow: hidden;
      border-radius: 22px;
      background: #000;
      min-height: 360px;
    }

    #reader video {
      border-radius: 22px !important;
    }

    .scan-overlay {
      pointer-events: none;
      position: absolute;
      left: 32px;
      right: 32px;
      top: 120px;
      height: 130px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.28);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.18);
    }

    .scan-overlay::before,
    .scan-overlay::after,
    .scan-corner-bl,
    .scan-corner-br {
      content: "";
      position: absolute;
      width: 34px;
      height: 34px;
      border-color: #ffffff;
      border-style: solid;
    }

    .scan-overlay::before {
      top: -2px;
      left: -2px;
      border-width: 4px 0 0 4px;
      border-top-left-radius: 18px;
    }

    .scan-overlay::after {
      top: -2px;
      right: -2px;
      border-width: 4px 4px 0 0;
      border-top-right-radius: 18px;
    }

    .scan-corner-bl {
      bottom: -2px;
      left: -2px;
      border-width: 0 0 4px 4px;
      border-bottom-left-radius: 18px;
    }

    .scan-corner-br {
      bottom: -2px;
      right: -2px;
      border-width: 0 4px 4px 0;
      border-bottom-right-radius: 18px;
    }

    .scan-line {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #67e8f9, transparent);
      box-shadow: 0 0 12px #67e8f9;
      animation: pulseLine 2s infinite ease-in-out;
    }

    @keyframes pulseLine {
      0%, 100% { opacity: 0.35; transform: translateY(-30px); }
      50% { opacity: 1; transform: translateY(30px); }
    }

    .bottom-actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .action-btn {
      border: none;
      border-radius: 18px;
      padding: 14px 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .primary {
      background: #111827;
      color: #fff;
    }

    .secondary {
      background: rgba(255,255,255,0.85);
      color: #111827;
    }

    .accent {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .info-card {
      margin-top: 16px;
      background: rgba(255,255,255,0.8);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.06);
    }

    .label {
      font-size: 12px;
      font-weight: 800;
      color: #6b7280;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    #status {
      font-size: 15px;
      font-weight: 600;
      color: #374151;
      line-height: 1.5;
    }

    #result {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      word-break: break-word;
      margin-top: 6px;
    }

    .sub {
      margin-top: 8px;
      color: #6b7280;
      font-size: 13px;
    }

    .footer-space {
      flex: 1;
    }

    @media (max-width: 380px) {
      .hero h2 {
        font-size: 21px;
      }

      .bottom-actions {
        grid-template-columns: 1fr;
      }

      .scan-overlay {
        top: 112px;
        height: 118px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="icon-btn">←</button>
      <div class="title-wrap">
        <small>Smart Inventory</small>
        <h1>Barcode Scanner</h1>
      </div>
      <button class="icon-btn">⋯</button>
    </div>

    <div class="hero">
      <h2>Scan medicine barcode quickly</h2>
      <p>Place the barcode inside the frame. The scanner will detect and send it automatically.</p>

      <div class="scanner-shell">
        <div class="scanner-header">
          <div class="left">Live Camera</div>
          <div class="live-pill">LIVE</div>
        </div>

        <div id="reader"></div>

        <div class="scan-overlay">
          <div class="scan-line"></div>
          <div class="scan-corner-bl"></div>
          <div class="scan-corner-br"></div>
        </div>
      </div>

      <div class="bottom-actions">
        <button id="startBtn" class="action-btn primary">Start Scan</button>
        <button id="stopBtn" class="action-btn secondary">Stop</button>
        <button id="torchBtn" class="action-btn accent">Torch</button>
      </div>
    </div>

    <div class="info-card">
      <div class="label">Status</div>
      <div id="status">Waiting for scan...</div>
    </div>

    <div class="info-card">
      <div class="label">Last Barcode</div>
      <div id="result">—</div>
      <div id="lastTime" class="sub">No barcode scanned yet</div>
    </div>

    <div class="footer-space"></div>
  </div>

  <script>
    const webhook = "PASTE_YOUR_N8N_WEBHOOK_HERE";

    let scanner = null;
    let lastCode = "";
    let lastScanTime = 0;

    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const lastTimeEl = document.getElementById("lastTime");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function sendBarcode(code) {
      const now = Date.now();
      if (code === lastCode && now - lastScanTime < 1500) return;

      lastCode = code;
      lastScanTime = now;

      resultEl.textContent = code;
      lastTimeEl.textContent = "Last scan: " + new Date().toLocaleTimeString();
      setStatus("Barcode detected successfully.");

      try {
        await fetch(webhook, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ barcode: code })
        });
        setStatus("Barcode sent to system.");
      } catch (error) {
        console.error(error);
        setStatus("Scanned, but webhook failed.");
      }
    }

    function startScanner() {
      if (scanner) return;

      scanner = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(devices => {
        if (!devices || !devices.length) {
          setStatus("No camera found.");
          return;
        }

        const backCamera =
          devices.find(device =>
            device.label.toLowerCase().includes("back") ||
            device.label.toLowerCase().includes("rear")
          ) || devices[0];

        scanner.start(
          backCamera.id,
          {
            fps: 15,
            qrbox: { width: 260, height: 120 },
            aspectRatio: 1.3333333,
            disableFlip: false,
            experimentalFeatures: {
              useBarCodeDetectorIfSupported: true
            },
            formatsToSupport: [
              Html5QrcodeSupportedFormats.EAN_13,
              Html5QrcodeSupportedFormats.EAN_8,
              Html5QrcodeSupportedFormats.UPC_A,
              Html5QrcodeSupportedFormats.UPC_E,
              Html5QrcodeSupportedFormats.CODE_128
            ]
          },
          (decodedText) => {
            sendBarcode(decodedText);
          },
          () => {}
        ).then(() => {
          setStatus("Scanner is live. Point at barcode.");
        }).catch(err => {
          console.error(err);
          setStatus("Could not start scanner.");
        });
      }).catch(err => {
        console.error(err);
        setStatus("Camera access failed.");
      });
    }

    function stopScanner() {
      if (!scanner) return;

      scanner.stop().then(() => {
        scanner.clear();
        scanner = null;
        setStatus("Scanner stopped.");
      }).catch(err => {
        console.error(err);
        setStatus("Stop failed.");
      });
    }

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);

    document.getElementById("torchBtn").addEventListener("click", () => {
      setStatus("Torch control depends on phone/browser support.");
    });
  </script>
</body>
</html>
