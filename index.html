<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcode Scanner</title>
  <script src="https://unpkg.com/@zxing/browser@latest"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6f8;
      color: #111827;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 16px;
      color: #4b5563;
      line-height: 1.5;
    }
    .camera-box {
      position: relative;
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      min-height: 360px;
    }
    video {
      width: 100%;
      height: 360px;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .guide {
      position: absolute;
      left: 12%;
      right: 12%;
      top: 40%;
      height: 80px;
      border: 3px solid #22c55e;
      border-radius: 18px;
      pointer-events: none;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    #startBtn {
      background: #16a34a;
      color: white;
    }
    #stopBtn {
      background: #e5e7eb;
      color: #111827;
    }
    .card {
      margin-top: 16px;
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }
    .label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #status {
      font-size: 16px;
      font-weight: 600;
    }
    #result {
      font-size: 28px;
      font-weight: 800;
      word-break: break-word;
      min-height: 34px;
    }
    #lastTime {
      margin-top: 8px;
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Medicine Barcode Scanner</h1>
    <p>Tap start, allow camera access, then place the barcode inside the green frame.</p>

    <div class="camera-box">
      <video id="video" muted playsinline></video>
      <div class="guide"></div>
    </div>

    <div class="buttons">
      <button id="startBtn" type="button">Start Scan</button>
      <button id="stopBtn" type="button">Stop</button>
    </div>

    <div class="card">
      <div class="label">Status</div>
      <div id="status">Waiting to start...</div>
    </div>

    <div class="card">
      <div class="label">Last Barcode</div>
      <div id="result">—</div>
      <div id="lastTime">No scan yet</div>
    </div>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const webhook = "PASTE_YOUR_N8N_WEBHOOK_HERE";

      const videoEl = document.getElementById("video");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const lastTimeEl = document.getElementById("lastTime");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");

      let codeReader = null;
      let controls = null;
      let lastCode = "";
      let lastScanAt = 0;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      async function sendBarcode(code) {
        const now = Date.now();
        if (code === lastCode && now - lastScanAt < 1500) return;

        lastCode = code;
        lastScanAt = now;

        resultEl.textContent = code;
        lastTimeEl.textContent = "Last scan: " + new Date().toLocaleTimeString();
        setStatus("Barcode detected.");

        if (!webhook || webhook === "PASTE_YOUR_N8N_WEBHOOK_HERE") {
          setStatus("Scanned locally. Add webhook URL to send data.");
          return;
        }

        try {
          await fetch(webhook, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ barcode: code })
          });
          setStatus("Barcode sent to system.");
        } catch (err) {
          console.error(err);
          setStatus("Scanned, but webhook failed.");
        }
      }

      async function startScanner() {
        try {
          if (controls) {
            setStatus("Scanner already running.");
            return;
          }

          setStatus("Opening camera...");

          const hints = new Map();
          hints.set(ZXingBrowser.DecodeHintType.POSSIBLE_FORMATS, [
            ZXingBrowser.BarcodeFormat.EAN_13,
            ZXingBrowser.BarcodeFormat.EAN_8,
            ZXingBrowser.BarcodeFormat.UPC_A,
            ZXingBrowser.BarcodeFormat.UPC_E,
            ZXingBrowser.BarcodeFormat.CODE_128
          ]);

          codeReader = new ZXingBrowser.BrowserMultiFormatReader(hints);

          const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
          if (!devices || devices.length === 0) {
            setStatus("No camera found.");
            return;
          }

          const backCamera =
            devices.find(d =>
              /back|rear|environment/i.test(d.label || "")
            ) || devices[0];

          controls = await codeReader.decodeFromVideoDevice(
            backCamera.deviceId,
            videoEl,
            (result, error) => {
              if (result) {
                sendBarcode(result.getText());
              }
            }
          );

          setStatus("Scanner is live. Point at barcode.");
        } catch (err) {
          console.error(err);
          setStatus("Could not start scanner.");
        }
      }

      async function stopScanner() {
        try {
          if (controls) {
            controls.stop();
            controls = null;
          }
          if (codeReader && typeof codeReader.reset === "function") {
            codeReader.reset();
          }
          setStatus("Scanner stopped.");
        } catch (err) {
          console.error(err);
          setStatus("Stop failed.");
        }
      }

      startBtn.addEventListener("click", startScanner);
      stopBtn.addEventListener("click", stopScanner);
    });
  </script>
</body>
</html>
